networks:
  temporal-net:
    driver: bridge

services:

  # Servidor Temporal em modo dev (SQLite integrado, UI incluída em :8080)
  temporal:
    image: temporalio/admin-tools:latest
    command: temporal server start-dev --ip 0.0.0.0 --ui-port 8080
    ports:
      - "7233:7233"
      - "8080:8080"
    networks:
      - temporal-net

  # CLI do Temporal (temporal workflow list, temporal operator namespace list, etc.)
  admin-tools:
    image: temporalio/admin-tools:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    stdin_open: true
    tty: true
    networks:
      - temporal-net

  # JupyterLab para explorar e testar o Temporal de forma interativa
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    volumes:
      - ./workspace:/app
    command: >
      bash -c "
        if [ -f requirements.txt ]; then
          pip install -q -r requirements.txt
        fi
        jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.token=''
      "
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8888:8888"
    depends_on:
      - temporal
    networks:
      - temporal-net

  # Ambiente Python para rodar os exercícios do curso
  app:
    build: .
    volumes:
      - ./workspace:/app
    command: >
      bash -c "
        if [ -f requirements.txt ]; then
          pip install -q -r requirements.txt
        fi
        exec bash
      "
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    stdin_open: true
    tty: true
    networks:
      - temporal-net
