services:

  # Servidor Temporal (dev mode, usa SQLite - sem banco externo necessário)
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=sqlite
    ports:
      - "7233:7233"   # porta que os workers/workflows usam para se conectar

  # Interface web do Temporal (acesse: http://localhost:8080)
  temporal-ui:
    image: temporalio/ui:latest
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  # JupyterLab para explorar e testar o Temporal de forma interativa
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    volumes:
      - ./workspace:/app
    command: >
      bash -c "
        if [ -f requirements.txt ]; then
          pip install -q -r requirements.txt
        fi
        jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.token=''
      "
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8888:8888"
    depends_on:
      - temporal

  # Ambiente Python para rodar os exercícios do curso
  app:
    build: .
    volumes:
      - ./workspace:/app    # pasta local workspace sincronizada com /app no container
    command: >
      bash -c "
        if [ -f requirements.txt ]; then
          pip install -q -r requirements.txt
        fi
        exec bash
      "
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    stdin_open: true
    tty: true
