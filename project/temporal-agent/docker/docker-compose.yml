services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.2
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    networks:
      - temporal-network

  temporal-ui:
    image: temporalio/ui:2.37.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    networks:
      - temporal-network

  worker:
    build:
      context: ../libs/temporal_core
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TASK_QUEUE: default
    networks:
      - temporal-network

  api:
    build:
      context: ../libs/api
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TASK_QUEUE: default
    ports:
      - "8000:8000"
    networks:
      - temporal-network

volumes:
  postgresql-data:

networks:
  temporal-network:
    driver: bridge
